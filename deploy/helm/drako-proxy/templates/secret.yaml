{{- if and .Values.config.apiKey (not .Values.config.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "drako-proxy.fullname" . }}-secret
  labels:
    {{- include "drako-proxy.labels" . | nindent 4 }}
type: Opaque
data:
  DRAKO_API_KEY: {{ .Values.config.apiKey | b64enc | quote }}
{{- end }}
