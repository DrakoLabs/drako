runtime: container
configSchema:
  type: object
  required: []
  properties:
    apiKey:
      type: string
      title: "Drako API Key"
      description: "Your Drako platform API key (optional for scan features, required for runtime governance)"
    policyEndpoint:
      type: string
      title: "Policy Server URL"
      description: "URL of your Drako backend for policy evaluation and audit logging"
build:
  dockerfile: Dockerfile
env:
  PORT: "8000"
